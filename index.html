<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperPulse — Cancer Cell Biology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --surface: #0e1118;
    --surface2: #161b27;
    --border: #1e2535;
    --text: #e8eaf0;
    --text-muted: #7a8299;
    --text-dim: #3d4560;
    --accent: #4fc3f7;
    --accent2: #81c784;
    --gold: #ffd54f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7, 9, 15, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 16px;
  }
  .logo {
    display: flex; align-items: baseline; gap: 8px; flex-shrink: 0;
  }
  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo-tag {
    font-size: 11px; font-weight: 400; color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .header-meta {
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .last-updated {
    font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  #refresh-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 14px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  #refresh-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
  #refresh-btn svg { transition: transform 0.5s; }
  #refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; gap: 4px; padding: 10px 0; align-items: center;
  }
  .filter-btn {
    flex-shrink: 0;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); border-color: #3d4560; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #07090f; font-weight: 500; }
  .filter-divider { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

  /* ── MAIN ── */
  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── STATUS BANNER ── */
  #status-bar {
    display: none; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 24px;
    font-size: 13px; color: var(--text-muted);
  }
  #status-bar.visible { display: flex; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }

  /* ── STATS ROW ── */
  #stats-row {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-muted); align-items: center;
  }
  #stats-row span { font-family: 'DM Mono', monospace; }
  #stats-row .dot { color: var(--text-dim); }

  /* ── PAPER GRID ── */
  #papers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  /* ── RESPONSIVE — tablet ── */
  @media (max-width: 768px) {
    #papers-grid { grid-template-columns: 1fr; gap: 12px; }
    main { padding: 16px 14px 60px; }
    .header-inner { height: 56px; }
    header { padding: 0 14px; }
    .filter-bar { padding: 0 14px; }
  }
  /* ── RESPONSIVE — phone ── */
  @media (max-width: 480px) {
    header { padding: 0 12px; }
    .header-inner { height: 52px; gap: 8px; }
    .logo-name { font-size: 18px; }
    .logo-tag { display: none; }
    .last-updated { display: none; }
    #refresh-btn { padding: 7px 10px; font-size: 0; gap: 0; }
    #refresh-btn svg { width: 16px; height: 16px; }
    .filter-bar { padding: 0 12px; }
    .filter-inner { gap: 6px; padding: 8px 0; }
    .filter-btn { font-size: 11px; padding: 4px 10px; }
    main { padding: 12px 12px 60px; }
    .paper-card { padding: 14px; gap: 10px; border-radius: 10px; }
    .paper-title { font-size: 15px; }
    .paper-abstract { font-size: 12px; line-height: 1.6; }
    .paper-authors { font-size: 11px; }
    .paper-date { font-size: 10px; }
    .journal-badge { font-size: 9px; padding: 2px 7px; }
    .card-actions { flex-direction: column; gap: 6px; }
    .btn-read { width: 100%; padding: 10px 14px; font-size: 13px; }
    .btn-expand { width: 100%; padding: 9px 14px; text-align: center; }
    #status-bar { padding: 10px 14px; font-size: 12px; }
    #stats-row { font-size: 11px; gap: 6px; margin-bottom: 14px; }
    .empty-state { padding: 48px 16px; }
  }
  /* ── RESPONSIVE — very small phones ── */
  @media (max-width: 360px) {
    .logo-name { font-size: 16px; }
    .paper-card { padding: 12px; }
    .paper-title { font-size: 14px; }
    main { padding: 10px 10px 60px; }
  }

  /* ── PAPER CARD ── */
  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    transition: all 0.2s; cursor: default;
    animation: fadeUp 0.35s ease both;
  }
  .paper-card:hover {
    border-color: #2a3352;
    background: var(--surface2);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .journal-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.4px;
    text-transform: uppercase; padding: 3px 9px; border-radius: 4px;
    border: 1px solid; flex-shrink: 0;
  }
  .paper-date {
    font-size: 11px; color: var(--text-muted);
    font-family: 'DM Mono', monospace; flex-shrink: 0;
  }
  .preprint-chip {
    font-size: 10px; background: rgba(255,213,79,0.1); color: var(--gold);
    border: 1px solid rgba(255,213,79,0.25); border-radius: 4px;
    padding: 2px 7px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .paper-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 500; line-height: 1.45;
    color: var(--text); letter-spacing: -0.1px;
  }
  .paper-authors {
    font-size: 12px; color: var(--text-muted); line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .paper-abstract {
    font-size: 13px; color: #9da5bc; line-height: 1.65;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; transition: all 0.3s;
  }
  .paper-abstract.expanded { -webkit-line-clamp: unset; }

  .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .btn-read {
    flex: 1; padding: 9px 16px; border-radius: 8px;
    background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.25);
    color: var(--accent); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-read:hover { background: rgba(79,195,247,0.18); border-color: var(--accent); }
  .btn-expand {
    padding: 9px 12px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-expand:hover { color: var(--text); border-color: #3d4560; }

  /* ── EMPTY / ERROR STATES ── */
  .empty-state {
    grid-column: 1/-1; text-align: center;
    padding: 80px 24px; color: var(--text-muted);
  }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── SECTION DIVIDERS ── */
  .section-header {
    grid-column: 1/-1;
    display: flex; align-items: center; gap: 12px;
    margin: 8px 0 4px;
  }
  .section-header span {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); font-weight: 500; white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* ── PROGRESS ── */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), #81c784);
    transition: width 0.3s; z-index: 200; width: 0%;
    box-shadow: 0 0 8px var(--accent);
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-name">PaperPulse</span>
      <span class="logo-tag">Cancer Cell Biology</span>
    </div>
    <div class="header-meta">
      <span class="last-updated" id="last-updated">Not yet loaded</span>
      <button id="refresh-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner" id="filter-inner">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All Papers</button>
    <button class="filter-btn" data-filter="journal" onclick="setFilter('journal',this)">Journals Only</button>
    <button class="filter-btn" data-filter="preprint" onclick="setFilter('preprint',this)">Preprints Only</button>
    <div class="filter-divider"></div>
    <!-- Journal-specific filters injected by JS -->
  </div>
</div>

<main>
  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Loading papers…</span>
  </div>
  <div id="stats-row"></div>
  <div id="papers-grid">
    <div class="empty-state">
      <h3>Fetching your feed…</h3>
      <p>Loading the latest papers from your journals.</p>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════
//  JOURNAL CONFIG
// ═══════════════════════════════════════════════════════

// Keeps research articles and reviews only.
// Both positive (must be Journal Article) and negative (exclude junk types).
const PT_FILTER = ' AND "Journal Article"[pt] NOT ("Comment"[pt] OR "Editorial"[pt] OR "News"[pt] OR "Letter"[pt] OR "Published Erratum"[pt] OR "Retraction of Publication"[pt] OR "Expression of Concern"[pt] OR "Biography"[pt] OR "Interview"[pt] OR "Newspaper Article"[pt])';

// Each journal has BOTH its print ISSN and electronic ISSN so PubMed matches
// papers regardless of which ISSN was used when the record was indexed.
// keyword: topic filter only for high-volume broad journals.
const PUBMED_JOURNALS = [
  { id:'nature',     name:'Nature',         pissn:'0028-0836', eissn:'1476-4687', color:'#ef5350', bg:'rgba(239,83,80,0.08)' },
  { id:'cell',       name:'Cell',           pissn:'0092-8674', eissn:'1097-4172', color:'#ff8a65', bg:'rgba(255,138,101,0.08)' },
  { id:'science',    name:'Science',        pissn:'0036-8075', eissn:'1095-9203', color:'#ffca28', bg:'rgba(255,202,40,0.08)' },
  { id:'ncb',        name:'Nat Cell Biol',  pissn:'1465-7392', eissn:'1476-4679', color:'#66bb6a', bg:'rgba(102,187,106,0.08)' },
  { id:'nbiotech',   name:'Nat Biotechnol', pissn:'1087-0156', eissn:'1546-1696', color:'#26c6da', bg:'rgba(38,198,218,0.08)' },
  { id:'cellmet',    name:'Cell Metab',     pissn:'1550-4131', eissn:'1932-7420', color:'#ab47bc', bg:'rgba(171,71,188,0.08)' },
  { id:'pnas',       name:'PNAS',           pissn:'0027-8424', eissn:'1091-6490', color:'#7e57c2', bg:'rgba(126,87,194,0.08)' },
  { id:'cancercell', name:'Cancer Cell',    pissn:'1535-6108', eissn:'1878-3686', color:'#ef5350', bg:'rgba(239,83,80,0.1)'  },
  { id:'jcb',        name:'J Cell Biol',    pissn:'0021-9525', eissn:'1540-8140', color:'#26a69a', bg:'rgba(38,166,154,0.08)' },
  { id:'biophysj',   name:'Biophys J',      pissn:'0006-3495', eissn:'1542-0086', color:'#42a5f5', bg:'rgba(66,165,245,0.08)' },
];

const BIORXIV_CATS = [
  { id:'biorxiv-cancer',  name:'bioRxiv · Cancer',    category:'cancer biology',    color:'#f48fb1', bg:'rgba(244,143,177,0.08)', isPreprint:true },
  { id:'biorxiv-biophys', name:'bioRxiv · Biophysics',category:'biophysics',        color:'#80cbc4', bg:'rgba(128,203,196,0.08)', isPreprint:true },
  { id:'biorxiv-synbio',  name:'bioRxiv · Syn Bio',   category:'synthetic biology', color:'#a5d6a7', bg:'rgba(165,214,167,0.08)', isPreprint:true },
];

// ═══════════════════════════════════════════════════════
//  CACHE  (localStorage — instant load on revisit)
// ═══════════════════════════════════════════════════════
const CACHE_KEY = 'paperpulse_v6';
const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

function saveCache(papers) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), papers }));
  } catch(e) { /* storage full — silently skip */ }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, papers } = JSON.parse(raw);
    return { papers, fresh: (Date.now() - ts) < CACHE_TTL, ts };
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let allPapers = [];
let currentFilter = 'all';

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════
const sleep  = ms => new Promise(r => setTimeout(r, ms));
const today  = ()  => new Date().toISOString().split('T')[0];
const daysAgo = n  => { const d = new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; };
// Parse date parts manually → local-time Date to avoid UTC midnight timezone shift
// e.g. new Date("2026-04-07") = midnight UTC = April 6 in US timezones — WRONG
// new Date(2026, 3, 7) = local midnight = April 7 everywhere — CORRECT
const fmt = d => {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3])
    .toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  try { return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}); }
  catch { return String(d); }
};

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
  if (pct >= 100) setTimeout(() => document.getElementById('progress-bar').style.width = '0%', 700);
}
function showStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-bar').classList.add('visible');
}
function hideStatus() { document.getElementById('status-bar').classList.remove('visible'); }

// ═══════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════
function buildFilterButtons() {
  const inner = document.getElementById('filter-inner');
  [...PUBMED_JOURNALS, ...BIORXIV_CATS].forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = src.id;
    btn.textContent = src.name;
    btn.onclick = () => setFilter(src.id, btn);
    inner.appendChild(btn);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPapers();
}

// ═══════════════════════════════════════════════════════
//  DOI / URL HELPERS  — never produce a broken link
// ═══════════════════════════════════════════════════════
function extractDoi(elocationid, articleids) {
  // Try elocationid first: "doi: 10.1038/xxx" or "pii: S0092..." etc.
  if (elocationid) {
    for (const part of elocationid.split(';')) {
      const m = part.trim().match(/^doi:\s*(.+)/i);
      if (m) return m[1].trim();
    }
  }
  // Fallback: articleids array
  if (Array.isArray(articleids)) {
    const e = articleids.find(a => a.idtype === 'doi');
    if (e && e.value && e.value !== '0') return e.value.trim();
  }
  return null;
}

function makePaperUrl(doi, pmid) {
  // Prefer DOI → lands on the official journal page
  if (doi && doi !== 'null' && doi !== 'undefined') return 'https://doi.org/' + doi;
  // Fallback: PubMed abstract page (always works)
  if (pmid) return 'https://pubmed.ncbi.nlm.nih.gov/' + pmid + '/';
  return null;
}

function resolveDate(sortpubdate, epubdate, pubdate) {
  // sortpubdate: PubMed's best-date field, ALWAYS populated, format "YYYY/MM/DD HH:MM"
  // epubdate:    actual online pub date, often empty string
  // pubdate:     print issue date, often weeks/months in the future → least preferred
  const cap = today();
  const capDate = new Date(cap);

  if (sortpubdate && sortpubdate.trim()) {
    const iso = sortpubdate.trim().slice(0,10).replace(/\//g,'-'); // "YYYY-MM-DD"
    const d = new Date(iso + 'T12:00:00');
    if (!isNaN(d)) return d > capDate ? cap : iso;
  }
  if (epubdate && epubdate.trim()) {
    const d = new Date(epubdate.trim());
    if (!isNaN(d)) {
      const iso = d.toISOString().slice(0,10);
      return d > capDate ? cap : iso;
    }
  }
  if (pubdate && pubdate.trim()) {
    const d = new Date(pubdate.trim());
    if (!isNaN(d)) {
      const iso = d.toISOString().slice(0,10);
      return d > capDate ? cap : iso;
    }
    return pubdate.trim();
  }
  return '';
}

// ═══════════════════════════════════════════════════════
//  PUBMED FETCH
// ═══════════════════════════════════════════════════════
const EUTILS = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils';

async function pmSearch(journal, delayMs) {
  await sleep(delayMs);
  // Search BOTH print and electronic ISSN — some records are indexed under either.
  // datetype=edat: Entrez indexing date = matches day paper goes online, not future print date.
  // sort=pub_date: valid PubMed sort parameter (sort=date and sort=pub+date are invalid).
  // retmax=200: fetch up to 200 per journal over 90 days.
  // Staggered 400ms apart → 2.5 req/sec, safely under PubMed's 3 req/sec anonymous limit.
  const term = `("${journal.pissn}"[issn] OR "${journal.eissn}"[issn])${PT_FILTER}`;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const url = `${EUTILS}/esearch.fcgi?db=pubmed&term=${encodeURIComponent(term)}&datetype=edat&reldate=90&sort=pub_date&retmax=200&retmode=json`;
      const r = await fetch(url);
      if (r.status === 429) { await sleep(1500 * (attempt+1)); continue; }
      if (!r.ok) return { journal, ids: [] };
      const data = await r.json();
      return { journal, ids: data.esearchresult?.idlist || [] };
    } catch(e) {
      if (attempt < 2) { await sleep(1000 * (attempt+1)); continue; }
    }
  }
  return { journal, ids: [] };
}

async function pmSummary(idJournalMap) {
  const ids = Object.keys(idJournalMap);
  if (!ids.length) return [];
  const CHUNK = 200; // PubMed silently truncates single URLs with >~200 IDs
  const results = [];
  for (let i = 0; i < ids.length; i += CHUNK) {
    const chunk = ids.slice(i, i + CHUNK);
    try {
      const r = await fetch(`${EUTILS}/esummary.fcgi?db=pubmed&id=${chunk.join(',')}&retmode=json`);
      if (!r.ok) continue;
      const data = await r.json();
      const res = data.result || {};
      chunk.forEach(id => {
        const p = res[id];
        if (!p || p.error) return;
        const doi  = extractDoi(p.elocationid, p.articleids);
        const url  = makePaperUrl(doi, id);
        if (!url) return;
        // sortpubdate is always set by PubMed — use it as the primary date
        const date = resolveDate(p.sortpubdate, p.epubdate, p.pubdate);
        results.push({
          id:         'pm-' + id,
          title:      (p.title || '').replace(/\.$/, '') || 'Untitled',
          authors:    (p.authors||[]).slice(0,4).map(a=>a.name).join(', ')
                      + ((p.authors||[]).length > 4 ? ' et al.' : ''),
          abstract:   p.abstracttext || null,
          journal:    idJournalMap[id],
          date, dateSort: date,
          doi, pmid: id, url,
          isPreprint: false,
        });
      });
    } catch(e) { /* continue with next chunk */ }
    if (i + CHUNK < ids.length) await sleep(300);
  }
  return results;
}

async function pmAbstracts(papers) {
  const need = papers.filter(p => !p.abstract && p.pmid);
  if (!need.length) return;
  const CHUNK = 100; // XML responses are heavy — chunk to avoid timeouts
  for (let i = 0; i < need.length; i += CHUNK) {
    const chunk = need.slice(i, i + CHUNK);
    try {
      const r = await fetch(`${EUTILS}/efetch.fcgi?db=pubmed&id=${chunk.map(p=>p.pmid).join(',')}&rettype=abstract&retmode=xml`);
      if (!r.ok) continue;
      const xml = new DOMParser().parseFromString(await r.text(), 'text/xml');
      xml.querySelectorAll('PubmedArticle').forEach(art => {
        const pmid = art.querySelector('PMID')?.textContent;
        const abs  = [...art.querySelectorAll('AbstractText')].map(n=>n.textContent).join(' ').trim();
        if (pmid && abs) { const p = papers.find(x=>x.pmid===pmid); if (p) p.abstract = abs; }
      });
    } catch(e) { /* continue */ }
    if (i + CHUNK < need.length) await sleep(400);
  }
}

// ═══════════════════════════════════════════════════════
//  CROSSREF FETCH
//
//  Two critical fixes vs the naive approach:
//
//  1. Filter = from-online-pub-date (NOT from-index-date)
//     CrossRef re-indexes old records whenever metadata changes
//     (e.g. Cell Press finalises print issue assignment weeks later).
//     from-index-date returns those old papers with a recent indexed
//     date, making Feb 9 papers appear as Apr 2.
//     from-online-pub-date filters by actual online publication date —
//     only papers genuinely published recently come back.
//
//  2. Date = published-online only, fallback to published-print
//     Never use "indexed" as a display date — it reflects CrossRef's
//     internal processing time, not when the paper was published.
//     published-online = day the paper appeared on the journal site.
//     published-print  = print issue date (may be future, gets capped).
// ═══════════════════════════════════════════════════════
function parseCRDate(dateObj) {
  const dp = dateObj?.['date-parts']?.[0];
  if (!dp?.[0]) return null;
  const y = dp[0], mo = String(dp[1] || 1).padStart(2,'0'), d = String(dp[2] || 1).padStart(2,'0');
  return `${y}-${mo}-${d}`;
}

async function fetchCrossRef(journal) {
  const from = daysAgo(90);
  // from-online-pub-date: only papers actually published online in the last 90 days.
  // published-online and published-print are selected to get the correct date.
  // indexed is intentionally excluded from select — we never use it as a date.
  const url = `https://api.crossref.org/works?filter=issn:${journal.pissn},type:journal-article,from-online-pub-date:${from}&sort=published&order=desc&rows=100&select=DOI,title,author,abstract,published-online,published-print`;
  try {
    const r = await fetch(url, {
      headers: { 'User-Agent': 'PaperPulse/1.0 (academic research feed)' }
    });
    if (!r.ok) return [];
    const data = await r.json();
    const cap = today();
    return (data.message?.items || [])
      .filter(item => item.DOI && item.title?.[0])
      .map(item => {
        // published-online first (actual web pub date).
        // published-print only if published-online is absent (and it may be future — cap it).
        // Never fall back to indexed.
        const onlineIso = parseCRDate(item['published-online']);
        const printIso  = parseCRDate(item['published-print']);
        let date = onlineIso || printIso || '';
        if (date > cap) date = cap;

        const doi = item.DOI;
        const abstract = item.abstract
          ? item.abstract.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim()
          : null;
        const authors = (item.author || []).slice(0, 4)
          .map(a => [a.given, a.family].filter(Boolean).join(' ')).join(', ')
          + ((item.author || []).length > 4 ? ' et al.' : '');

        return {
          id:           'cr-' + doi.replace(/[^a-zA-Z0-9]/g, '-'),
          title:        item.title[0].replace(/<[^>]+>/g, '').trim() || 'Untitled',
          authors,
          abstract,
          journal,
          date, dateSort: date,
          doi, pmid: null,
          url:          'https://doi.org/' + doi,
          isPreprint:   false,
          source:       'crossref',
          hasOnlineDate: !!onlineIso,  // true only when published-online was set by publisher
        };
      });
  } catch(e) {
    console.warn('CrossRef error', journal.name, e);
    return [];
  }
}

// ═══════════════════════════════════════════════════════
//  BIORXIV FETCH  (14-day window per category)
// ═══════════════════════════════════════════════════════
async function fetchBioRxiv(cat) {
  // Use a 14-day window and fetch page 0 (100 papers max).
  // Much lighter than 30-day, and recent preprints are what we want.
  const url = `https://api.biorxiv.org/details/biorxiv/${daysAgo(14)}/${today()}/0/json`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    return (data.collection || [])
      .filter(p => p.category?.toLowerCase() === cat.category.toLowerCase())
      .slice(0, 10)
      .map(p => ({
        id:       'bx-' + (p.doi||'').replace(/\//g,'-'),
        title:    (p.title||'').trim() || 'Untitled',
        authors:  (p.authors||'').split('; ').slice(0,4).join(', ') + ((p.authors||'').split('; ').length>4?' et al.':''),
        abstract: p.abstract || null,
        journal:  cat,
        date:     p.date || '',
        dateSort: p.date || '',
        doi:      p.doi || null,
        pmid:     null,
        url:      p.doi ? 'https://doi.org/' + p.doi : null,
        isPreprint: true,
      }))
      .filter(p => p.url); // only keep papers with a valid link
  } catch(e) { return []; }
}

// ═══════════════════════════════════════════════════════
//  ASSEMBLE + SORT + DEDUP
//
//  Core insight: PubMed has the best metadata (abstracts, author
//  names, PMIDs) but WRONG dates for Cell Press journals — because
//  PubMed's sortpubdate for those papers is the indexing date, not
//  the publication date. CrossRef has the correct published-online
//  date but less complete metadata.
//
//  Strategy: keep PubMed metadata, but overwrite the date with
//  CrossRef's published-online when the publisher registered it.
// ═══════════════════════════════════════════════════════
function assemblePapers(pubmedPapers, crossrefArrays, bxArrays) {
  // Build CrossRef lookup: DOI → confirmed online-pub date
  // Only use entries where the publisher explicitly registered published-online.
  const crOnlineDateByDoi = new Map();
  crossrefArrays.flat().forEach(p => {
    if (p.doi && p.hasOnlineDate && p.date) {
      crOnlineDateByDoi.set(p.doi.toLowerCase(), p.date);
    }
  });

  // Patch PubMed dates: if CrossRef has a confirmed published-online date
  // for this paper, replace PubMed's sortpubdate (which can be the indexing
  // date, not the publication date, for Cell Press / Elsevier journals).
  pubmedPapers.forEach(p => {
    if (p.doi) {
      const correctDate = crOnlineDateByDoi.get(p.doi.toLowerCase());
      if (correctDate) {
        p.date    = correctDate;
        p.dateSort = correctDate;
      }
    }
  });

  // CrossRef-only: papers not yet indexed by PubMed (fills recency gap)
  const pmDois = new Set(pubmedPapers.filter(p => p.doi).map(p => p.doi.toLowerCase()));
  const crossrefOnly = crossrefArrays.flat()
    .filter(p => p.doi && !pmDois.has(p.doi.toLowerCase()));

  const all = [...pubmedPapers, ...crossrefOnly, ...bxArrays.flat()];

  all.sort((a, b) => {
    const da = a.dateSort ? new Date(a.dateSort + 'T12:00:00') : new Date(0);
    const db = b.dateSort ? new Date(b.dateSort + 'T12:00:00') : new Date(0);
    return db - da;
  });

  const seenDoi = new Set(), seenTitle = new Set();
  return all.filter(p => {
    if (p.doi) {
      const dk = p.doi.toLowerCase();
      if (seenDoi.has(dk)) return false;
      seenDoi.add(dk);
    }
    const tk = p.title.toLowerCase().replace(/\s+/g, '').slice(0, 60);
    if (seenTitle.has(tk)) return false;
    seenTitle.add(tk);
    return true;
  });
}

// ═══════════════════════════════════════════════════════
//  MAIN LOAD
// ═══════════════════════════════════════════════════════
async function loadAll(forceRefresh = false) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  // ── Show cache instantly if available ──────────────────────────
  const cached = loadCache();
  if (cached && !forceRefresh) {
    allPapers = cached.papers;
    renderPapers();
    const ago = Math.round((Date.now() - cached.ts) / 60000);
    document.getElementById('last-updated').textContent = `Cached · ${ago}m ago`;
    if (cached.fresh) {
      // Cache is fresh — no need to re-fetch at all
      btn.classList.remove('spinning');
      return;
    }
    // Cache is stale — show it but refresh in background
    showStatus('Updating feed in background…');
  } else {
    showStatus('Fetching papers…');
    setProgress(10);
    renderPapers(); // shows "Loading feed…" empty state
  }

  // ── Phase 1: PubMed + CrossRef + bioRxiv all in parallel ──────
  // PubMed: staggered 400ms (2.5 req/sec, under 3 req/sec limit).
  // CrossRef: all at once (generous rate limit).
  const [searchSettled, crSettled, ...bxSettled] = await Promise.allSettled([
    Promise.allSettled(PUBMED_JOURNALS.map((j,i) => pmSearch(j, i * 400))),
    Promise.allSettled(PUBMED_JOURNALS.map(j => fetchCrossRef(j))),
    ...BIORXIV_CATS.map(cat => fetchBioRxiv(cat))
  ]);
  setProgress(55);

  // ── Phase 2: batched PubMed summary ────────────────────────────
  const idMap = {};
  if (searchSettled.status === 'fulfilled') {
    searchSettled.value.forEach(r => {
      if (r.status === 'fulfilled') r.value.ids.forEach(id => { idMap[id] = r.value.journal; });
    });
  }
  showStatus('Loading paper details…');
  const pubmedPapers = await pmSummary(idMap);
  setProgress(80);

  // ── Phase 3: batched PubMed abstracts ──────────────────────────
  showStatus('Fetching abstracts…');
  await pmAbstracts(pubmedPapers);
  setProgress(95);

  // ── Assemble ───────────────────────────────────────────────────
  const crossrefArrays = crSettled.status === 'fulfilled'
    ? crSettled.value.map(r => r.status === 'fulfilled' ? r.value : [])
    : [];
  const bxArrays = bxSettled.map(r => r.status === 'fulfilled' ? r.value : []);
  allPapers = assemblePapers(pubmedPapers, crossrefArrays, bxArrays);

  saveCache(allPapers);
  setProgress(100);
  hideStatus();
  btn.classList.remove('spinning');
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  renderPapers();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderPapers() {
  const grid  = document.getElementById('papers-grid');
  const stats = document.getElementById('stats-row');

  let filtered = allPapers;
  if      (currentFilter === 'journal')  filtered = allPapers.filter(p => !p.isPreprint);
  else if (currentFilter === 'preprint') filtered = allPapers.filter(p =>  p.isPreprint);
  else if (currentFilter !== 'all')      filtered = allPapers.filter(p =>  p.journal.id === currentFilter);

  if (!allPapers.length) {
    grid.innerHTML = `<div class="empty-state"><h3>Fetching your feed…</h3><p>Loading the latest papers from your journals.</p></div>`;
    stats.innerHTML = ''; return;
  }
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No papers found</h3><p>No recent papers matched this filter.</p></div>`;
  } else {
    const journals  = filtered.filter(p => !p.isPreprint);
    const preprints = filtered.filter(p =>  p.isPreprint);
    let html = '';
    if (journals.length && preprints.length) {
      html += sectionHeader('Journal Articles');
      journals.forEach((p,i)  => { html += paperCard(p,i); });
      html += sectionHeader('Preprints (bioRxiv)');
      preprints.forEach((p,i) => { html += paperCard(p, i + journals.length); });
    } else {
      filtered.forEach((p,i)  => { html += paperCard(p,i); });
    }
    grid.innerHTML = html;
  }

  const nJ = allPapers.filter(p=>!p.isPreprint).length;
  const nP = allPapers.filter(p=> p.isPreprint).length;
  stats.innerHTML = `<span>${allPapers.length} papers</span><span class="dot">·</span><span>${nJ} journal articles</span><span class="dot">·</span><span>${nP} preprints</span><span class="dot">·</span><span>Last 90 days</span>`;
}

function sectionHeader(label) {
  return `<div class="section-header"><div class="section-line"></div><span>${label}</span><div class="section-line"></div></div>`;
}

function paperCard(paper, idx) {
  const j       = paper.journal;
  const delay   = Math.min(idx * 25, 300);
  const abstract = paper.abstract || 'Abstract not available. Click "Open Paper" to read the full text.';
  const url     = paper.url || '#';
  const isReal  = url !== '#';

  return `
  <div class="paper-card" style="animation-delay:${delay}ms">
    <div class="card-top">
      <span class="journal-badge" style="color:${j.color};border-color:${j.color}22;background:${j.bg}">${j.name}</span>
      <span class="paper-date">${fmt(paper.date)}</span>
    </div>
    ${paper.isPreprint ? '<span class="preprint-chip">Preprint</span>' : ''}
    <div class="paper-title">${esc(paper.title)}</div>
    <div class="paper-authors">${esc(paper.authors) || 'Authors not available'}</div>
    <div class="paper-abstract" id="abs-${safeId(paper.id)}">${esc(abstract)}</div>
    <div class="card-actions">
      ${isReal
        ? `<a class="btn-read" href="${url}" target="_blank" rel="noopener noreferrer">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
               <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
               <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
             </svg>Open Paper</a>`
        : `<span class="btn-read" style="opacity:.4;cursor:default">No link available</span>`
      }
      <button class="btn-expand" onclick="toggleAbs('${safeId(paper.id)}',this)">Expand</button>
    </div>
  </div>`;
}

function toggleAbs(id, btn) {
  const el = document.getElementById('abs-' + id);
  if (!el) return;
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Collapse' : 'Expand';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeId(s) { return String(s||'').replace(/[^a-zA-Z0-9]/g,'-'); }

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
buildFilterButtons();
// Pass forceRefresh=true when user clicks the Refresh button
document.getElementById('refresh-btn').onclick = () => loadAll(true);
loadAll();
</script>
